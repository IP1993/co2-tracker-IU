<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt - CO₂ Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand d-flex align-items-center" href="index.html">
    <img src="assets/logo.png" alt="Logo" class="logo me-2">
    CO₂ Tracker
  </a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Startseite</a></li>
      <li class="nav-item"><a class="nav-link" href="daten.html">Daten</a></li>
      <li class="nav-item"><a class="nav-link active" href="kontakt.html">Kontakt</a></li>
    </ul>

    <button id="themeToggle" class="btn btn-outline-light ms-3">Dark Mode</button>
  </div>
</nav>

<main class="container py-5">
  <h1>Kontakt</h1>
  <p>Sie können uns über das folgende Formular erreichen:</p>

  <form id="contactForm" class="mt-4" autocomplete="off">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input type="text" id="name" class="form-control" required maxlength="100">
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">E-Mail</label>
      <input type="email" id="email" class="form-control" required maxlength="150">
    </div>

    <div class="mb-3">
      <label for="message" class="form-label">Nachricht</label>
      <textarea id="message" class="form-control" rows="5" required maxlength="1000"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Absenden</button>
  </form>

  <div id="successMessage" class="alert alert-success mt-4 d-none">
    Vielen Dank! Ihre Nachricht wurde erfolgreich übermittelt.
  </div>
</main>

<footer class="text-center p-3">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SECURE FORM HANDLING -->
<script>
document.getElementById("contactForm").addEventListener("submit", (e) => {
  e.preventDefault();

  // Basic sanitization
  const sanitize = (str) =>
    str.replace(/[<>]/g, "");

  const name = sanitize(document.getElementById("name").value);
  const email = sanitize(document.getElementById("email").value);
  const message = sanitize(document.getElementById("message").value);

  console.log("Form submitted:", { name, email, message });

  document.getElementById("successMessage").classList.remove("d-none");
  e.target.reset();
});
</script>

<script>
const toggleBtn = document.getElementById("themeToggle");
toggleBtn?.addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  toggleBtn.textContent =
    document.body.classList.contains("dark-mode")
      ? "Light Mode"
      : "Dark Mode";
});
</script>

</body>
</html>
